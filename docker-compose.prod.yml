# Override pour la prod : restart, profil Spring prod, limites ressources, Keycloak optimisé
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M }
        reservations: { memory: 256M }

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 256M }
        reservations: { memory: 128M }

  keycloak:
    command: ["start"]
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M }
        reservations: { memory: 256M }

  app-backend:
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
    deploy:
      resources:
        limits: { memory: 768M }
        reservations: { memory: 384M }

  app-frontend:
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 64M }
        reservations: { memory: 32M }
