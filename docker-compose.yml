services:
  postgres:
    image: postgres:16-alpine
    container_name: simulation-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simulation}
      POSTGRES_USER: ${POSTGRES_USER:-simulation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simulation}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simulation} -d ${POSTGRES_DB:-simulation}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: simulation-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: simulation-keycloak
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  app-backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
    container_name: simulation-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-simulation}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-simulation}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-simulation}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  app-frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile
    container_name: simulation-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      app-backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
