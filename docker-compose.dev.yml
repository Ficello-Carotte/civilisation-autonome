# Override pour le dev : live reload (backend + frontend), profiler JFR, Keycloak start-dev
# Usage : docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Backend live reload : après une modif, lance "mvn compile" (ou mvn package) en local ;
#   DevTools redémarre le conteneur grâce au volume target/classes.
# Frontend live reload : le serveur Vite tourne dans le conteneur, HMR via le volume monté.

services:
  app-backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile
      target: dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./app-backend/target/classes:/app/classes:ro
    command:
      - java
      - -Dloader.path=/app/classes
      - -XX:StartFlightRecording=filename=/tmp/recording.jfr,maxsize=100M,maxage=1d
      - -jar
      - app.jar

  app-frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./app-frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      PROXY_API_TARGET: http://app-backend:8080
      PROXY_WS_TARGET: ws://app-backend:8080
    command: ["npm", "run", "dev"]

  keycloak:
    command: ["start-dev"]

volumes:
  frontend_node_modules:
