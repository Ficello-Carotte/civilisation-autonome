name: Lint

on:
  push:
  pull_request:

jobs:
  backend:
    name: backend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Lint backend (Checkstyle + Spotless)
        run: mvn validate -B
        working-directory: app-backend
  frontend:
    name: frontend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install
        working-directory: app-frontend

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: app-frontend

      - name: Format check (Prettier)
        run: npm run format:check
        working-directory: app-frontend

      - name: Build frontend
        run: npm run build
        working-directory: app-frontend
